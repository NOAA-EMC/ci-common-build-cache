# Common configuration for nceplibs environments
# This file contains shared settings used by both nceplibs-develop.yaml
# and nceplibs-numbered.yaml
# NOTE: This file is included via the 'include:' directive.
# - Only configuration sections are allowed (packages, view, concretizer, etc.)
# - The 'specs' section is NOT allowed in included files

packages:
  all:
    require:
      - any_of: ["+shared", "libs=shared", "@:"]
  jasper:
    require: +jpeg
  python:
    require: '@3.11'
  esmf:
    require: '~xerces ~pnetcdf +shared +external-parallelio'
  mapl:
    require: '~pflogger ~fargparse ~extdata2g'
  netcdf-c:
    require: '+dap +mpi ~parallel-netcdf ~szip build_system=cmake'
  cmake:
    require:
    - any_of: ['@3.29']
      when: '%intel'
  hdf5:
    require:
    - any_of: ['+threadsafe']
      when: '%intel'
  papi:
    require: ['@7.2.0']
  boost:
    require: ['@:1.88'] # hpctoolkit fails without deprecated libboost_system.so
  scorep:
    require: ['~gcc-plugin']
