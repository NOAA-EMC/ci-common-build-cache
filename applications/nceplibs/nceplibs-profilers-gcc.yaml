# Profiler package configuration for nceplibs environments
# IMPORTANT: Only use when building with GCC compiler
# Profilers have dependencies (PAPI, scorep) that may not be compatible with all compilers
#
# NOTE: This file only contains package configuration.
# The profiler specs must be added to the environment separately (cannot be in included files).
# The CI workflow adds profiler specs dynamically using 'spack add' command.
packages:
  scorep:
    require: ['~gcc-plugin']
  scalasca:
    require: ['^scorep +fortran +mpi +mpi_f08 +papi']
  hpctoolkit:
    require: ['+mpi +papi']
