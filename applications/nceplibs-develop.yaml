# nceplibs develop version environment
# This environment builds the latest development versions of nceplibs packages
#
# To include profilers (GCC only), add the following to the include section:
#   - nceplibs/nceplibs-profilers-gcc.yaml
#
# Example:
#   spack:
#     include:
#       - nceplibs/nceplibs-common.yaml
#       - nceplibs/nceplibs-profilers-gcc.yaml  # Only when using GCC
spack:
  include:
    - nceplibs/nceplibs-common.yaml
  specs:
  # NCEPLIBS core packages:
  - bacio@develop
  - g2@develop +g2c_compare
  - g2c@develop +utils +build_v2_api
  - ip@develop precision=4,d,8
  - w3emc@develop precision=4,d,8
  # Common dependencies:
  - jasper +jpeg
  - libpng
  - openblas
  - zlib-ng
  - netcdf-fortran ^netcdf-c@4.9.2 +mpi  ^hdf5@1.14.5 +mpi
  - py-numpy
  # Test files:
  - ip-test-files
  - bufr-test-files
  packages:
    # NCEPLIBS version requirements (develop):
    bacio:
      require: '@develop'
    g2:
      require: '@develop +g2c_compare'
    g2c:
      require: '@develop +utils +build_v2_api'
    ip:
      require: '@develop'
    w3emc:
      require: '@develop'
