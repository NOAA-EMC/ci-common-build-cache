# NCEPLIBS 'develop' version environment
# This environment builds the latest development versions of NCEPLIBS packages

spack:
  view: false
  concretizer:
    unify: true
  include:
    - nceplibs/nceplibs-common.yaml
  definitions:
  - when: env.get("COMPILER_NAME") == "gcc"
    profiler_specs: [scalasca, hpctoolkit]
  specs:
  - $profiler_specs
  # NCEPLIBS core packages:
  - bacio@develop
  - g2@develop +g2c_compare
  - g2c@develop +utils +build_v2_api
  - ip@develop precision=4,d,8
  - w3emc@develop precision=4,d,8
  # Common dependencies:
  - jasper +jpeg
  - libpng
  - openblas
  - zlib-ng
  - netcdf-fortran ^netcdf-c@4.9.2 +mpi  ^hdf5@1.14.5 +mpi
  - py-numpy
  # Test files:
  - ip-test-files
  - bufr-test-files
  packages:
    # NCEPLIBS version requirements (develop):
    bacio:
      version: ['develop']
    g2:
      version: ['develop']
      variants: '+g2c_compare'
    g2c:
      version: ['develop']
      variants: '+utils +build_v2_api'
    ip:
      version: ['develop']
    w3emc:
      version: ['develop']
