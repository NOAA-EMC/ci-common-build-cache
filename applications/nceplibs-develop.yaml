# nceplibs develop version environment
# This environment builds the latest development versions of nceplibs packages
#
# Note: Profilers (scalasca, hpctoolkit, hpcviewer) are added automatically by CI for GCC builds.
# To manually add profilers when using GCC:
#   spack config add "include:[nceplibs/nceplibs-profilers-gcc.yaml]"
#   spack add scalasca hpctoolkit hpcviewer
spack:
  view: false
  concretizer:
    unify: true
  include:
    - nceplibs/nceplibs-common.yaml
  specs:
  # NCEPLIBS core packages:
  - bacio@develop
  - g2@develop +g2c_compare
  - g2c@develop +utils +build_v2_api
  - ip@develop precision=4,d,8
  - w3emc@develop precision=4,d,8
  # Common dependencies:
  - jasper +jpeg
  - libpng
  - openblas
  - zlib-ng
  - netcdf-fortran ^netcdf-c@4.9.2 +mpi  ^hdf5@1.14.5 +mpi
  - py-numpy
  # Test files:
  - ip-test-files
  - bufr-test-files
  packages:
    # NCEPLIBS version requirements (develop):
    bacio:
      require: '@develop'
    g2:
      require: '@develop +g2c_compare'
    g2c:
      require: '@develop +utils +build_v2_api'
    ip:
      require: '@develop'
    w3emc:
      require: '@develop'
