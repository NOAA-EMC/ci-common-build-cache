# NCEPLIBS numbered/released version environment
# This environment builds specific released versions of NCEPLIBS packages

spack:
  view: false
  concretizer:
    unify: true
  include:
    - nceplibs/nceplibs-common.yaml
  definitions:
  - when: env.get("COMPILER_NAME") == "gcc"
    profiler_specs: [scalasca, hpctoolkit]
  specs:
  - $profiler_specs
  # NCEPLIBS core packages:
  - bacio@2.6.0
  - g2@3.5.1
  - g2c@2.1.0
  - ip@5.4.0 precision=4,d,8
  - w3emc@2.10.0 precision=4,d,8 +extradeps
  # Common dependencies:
  - jasper +jpeg
  - libpng
  - openblas
  - zlib-ng
  - netcdf-fortran ^netcdf-c@4.9.2 +mpi  ^hdf5@1.14.5 +mpi
  - py-numpy
  # Test files:
  - ip-test-files
  - bufr-test-files
  packages:
    # NCEPLIBS version requirements (numbered):
    bacio:
      version: ['2.6.0']
    g2:
      version: ['3.5.1']
    g2c:
      version: ['2.1.0']
    ip:
      version: ['5.4.0']
    w3emc:
      version: ['2.10.0 +extradeps']
