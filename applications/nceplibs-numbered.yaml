# nceplibs numbered/released version environment
# This environment builds specific released versions of nceplibs packages
#
# Note: Profilers (scalasca, hpctoolkit, hpcviewer) are added automatically by CI for GCC builds.
# The nceplibs configuration directory is copied to the environment for containerization.
# To manually add profilers when using GCC:
#   cp -r applications/nceplibs $SPACK_ENV/.
#   spack config add "include:[nceplibs/nceplibs-profilers-gcc.yaml]"
#   spack add scalasca hpctoolkit hpcviewer
spack:
  view: false
  concretizer:
    unify: true
  include:
    - nceplibs/nceplibs-common.yaml
  specs:
  # NCEPLIBS core packages:
  - bacio@2.6.0
  - g2@3.5.1
  - g2c@2.1.0
  - ip@5.4.0 precision=4,d,8
  - w3emc@2.10.0 precision=4,d,8 +extradeps
  # Common dependencies:
  - jasper +jpeg
  - libpng
  - openblas
  - zlib-ng
  - netcdf-fortran ^netcdf-c@4.9.2 +mpi  ^hdf5@1.14.5 +mpi
  - py-numpy
  # Test files:
  - ip-test-files
  - bufr-test-files
  packages:
    # NCEPLIBS version requirements (numbered):
    bacio:
      require: '@2.6.0'
    g2:
      require: '@3.5.1'
    g2c:
      require: '@2.1.0'
    ip:
      require: '@5.4.0'
    w3emc:
      require: '@2.10.0 +extradeps'
