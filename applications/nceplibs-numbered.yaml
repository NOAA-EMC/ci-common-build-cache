# nceplibs numbered/released version environment
# This environment builds specific released versions of nceplibs packages
#
# To include profilers (GCC only), add the following to the include section:
#   - nceplibs/nceplibs-profilers-gcc.yaml
#
# Example:
#   spack:
#     include:
#       - nceplibs/nceplibs-common.yaml
#       - nceplibs/nceplibs-profilers-gcc.yaml  # Only when using GCC
spack:
  include:
    - nceplibs/nceplibs-common.yaml
  packages:
    # NCEPLIBS version requirements (numbered):
    bacio:
      require: '@2.6.0'
    g2:
      require: '@3.5.1'
    g2c:
      require: '@2.1.0'
    ip:
      require: '@5.4.0'
    w3emc:
      require: '@2.10.0 +extradeps'
