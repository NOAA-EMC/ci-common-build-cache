spack:
  view: false
  concretizer:
    unify: true
  specs:
  # Include ufs-weather-model just for testing; it will be deleted from container
  - ufs-weather-model app=S2SWA
  # Individual deps (pinned versions are at least as new as in ufs_common.lua):
  - jasper
  - libpng
  - hdf5@1.14.5
  - netcdf-c@4.9.2
  - netcdf-fortran@4.6.1
  - parallelio@2.6.3
  - esmf@8.8.0
  - fms@2024.02 precision=32,64 constants=GFS +deprecated_io
  - bacio@2.4.1
  - crtm@2.4.0.1
  - g2@3.5.1
  - g2tmpl
  - ip
  - sp@2.5.0
  - w3emc@2.12
  - gftl-shared
  - mapl@2.54.2 
  - scotch
  - cmake
  - gmake
  packages:
    jasper:
      variants: +jpeg
    python:
      version: ['3.12']
    esmf:
      variants: '~xerces ~pnetcdf +shared +external-parallelio'
    mapl:
      variants: '~pflogger ~fargparse ~extdata2g'
    netcdf-c:
      version: ['4.9.2']
      variants: '+dap +mpi ~parallel-netcdf ~szip build_system=cmake'
    cmake:
      version: ['3.29']
    hdf5:
      version: ['1.14.5']
      variants: '+mpi'
      require:
      - any_of: ['+threadsafe']
        when: '%intel'
