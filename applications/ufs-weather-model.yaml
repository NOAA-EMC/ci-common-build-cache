spack:
  view: false
  concretizer:
    unify: true
  specs:
  - ufs-weather-model app=S2SWA
  - mapl@2.54.2 
  - esmf@8.8.0
  - parallelio@2.6.3
  - netcdf-c@4.9.2
  - hdf5@1.14.5
  - sp@2.3.3
  - bacio@2.4.1
  - ip@3.3.3
  - w3emc@2.12
  - g2@3.5.1
  packages:
    jasper:
      variants: +jpeg
    python:
      version: ['3.12']
    esmf:
      variants: '~xerces ~pnetcdf +shared +external-parallelio'
    mapl:
      variants: '~pflogger ~fargparse ~extdata2g'
    netcdf-c:
      variants: '+dap +mpi ~parallel-netcdf ~szip build_system=cmake'
    cmake:
      version: ['3.29']
    hdf5:
      require:
      - any_of: ['+threadsafe']
        when: '%intel'
