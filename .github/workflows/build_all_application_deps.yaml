name: common-build-cache
on:
  workflow_dispatch:
#  push:
#    branches: [main]
# Do a full rebuild from scratch midnight UTC Saturday:
  schedule:
    - cron: '0 0 * * SAT'

jobs:
  common-build-cache:
    environment: spack-signing
    strategy:
      fail-fast: false
      matrix:
        application: [gsi] #[ufs-weather-model, gsi, nceplibs-develop, nceplibs-numbered, ufs-utils]
        config:
        - {compiler: gcc, compiler-version: "13", os: ubuntu-24.04, mpi: mpich, mpi-version: ":"}
        - {compiler: classic, compiler-version: "2023.2.1", os: ubuntu-24.04, mpi: intel-oneapi-mpi, mpi-version: "2021.17"}
        - {compiler: oneapi, compiler-version: "2025.3", os: ubuntu-24.04, mpi: intel-oneapi-mpi, mpi-version: "2021.17"}
        exclude:
        - application: gsi
          config: {compiler: classic}
        - application: gsi
          config: {compiler: oneapi}
        - application: ufs-weather-model
          config: {compiler: classic}
        - application: ufs-utils
          config: {compiler: classic}
    runs-on: ${{ matrix.config.os }}
    permissions:
      packages: write
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup GPG for package and container signing"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.SPACK_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.SPACK_SIGNING_KEY_PASSPHRASE }}
          GPG_PUBLIC_KEY: ${{ secrets.SPACK_SIGNING_PUBLIC_KEY }}
        run: |
          echo "::add-mask::${GPG_PRIVATE_KEY}"
          echo "::add-mask::${GPG_PASSPHRASE}"
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          # Get key ID for signing
          KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | grep "NOAA EMC common build cache" -B 3 | awk '{if ($1=="sec") print $2}' | cut -d'/' -f2)
          echo "SPACK_GPG_KEY_ID=${KEY_ID}" >> $GITHUB_ENV
          echo "Package and container signing enabled with key: ${KEY_ID}"
            
          # Configure GPG for non-interactive use
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "use-agent" >> ~/.gnupg/gpg.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          echo "max-cache-ttl 7200" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye || true

      - name: "Install Podman for container image signing"
        run: |
          # Ubuntu 24.04 has Podman 4.9+, Ubuntu 22.04 has Podman 3.4+
          # Both support --sign-by flag
          sudo apt-get update
          sudo apt-get install -y podman skopeo
          podman --version
          skopeo --version


      - name: "Get Spack"
        uses: spack/setup-spack@v3

      - name: "Get spack-helpers extension"
        uses: NOAA-EMC/spack-helpers@develop

      - name: "Get Intel"
        uses: NOAA-EMC/ci-install-intel-toolkit@develop
        if: ${{ matrix.config.compiler == 'classic' || matrix.config.compiler == 'oneapi' }}
        with:
          install-classic: ${{ matrix.config.compiler == 'classic' }}
          classic-version: ${{ matrix.config.compiler-version }}
          install-oneapi: ${{ matrix.config.compiler == 'oneapi' }}
          oneapi-version: ${{ matrix.config.compiler-version }}
          install-mpi: true
          mpi-version: ${{ matrix.config.mpi-version }}
          compiler-setup: ${{ matrix.config.compiler }}

      - name: "Build and cache packages"
        shell: spack-bash {0}
        env:
          OCI_USERNAME: ${{ github.repository_owner }}
          OCI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMPILER_NAME: ${{ matrix.config.compiler }}
          GPG_PASSPHRASE: ${{ secrets.SPACK_SIGNING_KEY_PASSPHRASE }}
          GPG_PUBLIC_KEY: ${{ secrets.SPACK_SIGNING_PUBLIC_KEY }}
        run: |
          # Mask token
          echo "::add-mask::${OCI_TOKEN}"
          
          if [ "${{ runner.debug }}" == 1 ]; then set -x; fi
          
          # Wrap spack command to echo before executing
          spack() {
            echo "::group:: spack $@"
            _spack_shell_wrapper "$@";
            echo "::endgroup::"
            return $?
          }
          
          # Relocate and asynchronously remove /usr/local to
          #  a) avoid conflicts/CMake find_package misfires, and
          #  b) free up disk space
          sudo mv /usr/local /usr/local_mv
          sudo rm -rf /usr/local_mv &

          # Remove Spack-provided build cache to avoid confusion
          spack mirror rm github-actions-buildcache || true

          # Set up mirror for build caching:
          spack mirror add emc-common-build-cache oci://ghcr.io/$OCI_USERNAME/ci-common-build-cache-${{ matrix.config.compiler }}
          spack mirror set --push --oci-username-variable OCI_USERNAME --oci-password-variable OCI_TOKEN emc-common-build-cache

          app=${{ matrix.application }}
          echo "Processing application: ${app}"

          # Create and activate environment from manifest
          spack env create ${app}-env applications/${app}.yaml
          spack env activate ${app}-env
          cd $SPACK_ENV # need for 'containerize'
          
          # Copy nceplibs configuration files for nceplibs environments (needed for containerization)
          if [[ "${app}" =~ ^nceplibs-(develop|numbered)$ ]]; then
            echo "Copying nceplibs configuration directory for ${app}"
            cp -r $GITHUB_WORKSPACE/applications/nceplibs $SPACK_ENV/.
          fi
          
          
          spack config add 'config:install_tree:padded_length:200'

          # Materialize spack-packages directly under $SPACK_ROOT.
          spack_packages_repo_url=https://github.com/spack/spack-packages
          spack repo add "$spack_packages_repo_url" '$spack/spack-packages'
          # Comment this next line if very recent commits are needed:
          git -C "$SPACK_ROOT/spack-packages" checkout $(git -C "$SPACK_ROOT/spack-packages" rev-list -n 1 --before="4 days ago" develop)
          spack_packages_commit=$(git -C "$SPACK_ROOT/spack-packages" rev-parse HEAD || true)
          if [[ -z "${spack_packages_commit}" ]]; then
            echo "Unable to resolve commit for ${SPACK_ROOT}/spack-packages"
            exit 1
          fi
          echo "spack-packages origin: ${spack_packages_repo_url}"
          echo "spack-packages commit: ${spack_packages_commit}"

          cp -r $GITHUB_WORKSPACE/custom_repo $SPACK_ENV/.
          spack repo add '$env/custom_repo'

          # Set up compilers & MPI for this application
          COMPILER=${{ matrix.config.compiler }}@${{ matrix.config.compiler-version }}
          if [ ${{ matrix.config.compiler }} == 'gcc' ]; then
            sudo apt install gcc-${{ matrix.config.compiler-version }} g++-${{ matrix.config.compiler-version }} gfortran-${{ matrix.config.compiler-version }}
            spack config add "packages:gcc-runtime:require:'%gcc@${{ matrix.config.compiler-version }}'"
          else # set GCC backend for Intel to be the Ubuntu default version of GCC
            if [ ${{ matrix.config.os }} == ubuntu-22.04 ]; then gccver=11; fi
            if [ ${{ matrix.config.os }} == ubuntu-24.04 ]; then gccver=13; fi
            spack config add "packages:gcc-runtime:require:'%gcc@${gccver}'"
          fi
          if [ ${{ matrix.config.compiler }} == 'oneapi' ]; then
            spack compiler find /opt/intel/oneapi/compiler/${{ matrix.config.compiler-version }}
            spack compiler find /opt/intel/oneapi/compiler/${{ matrix.config.compiler-version }}/linux
            COMPILER=intel-oneapi-compilers
          elif [ ${{ matrix.config.compiler }} == 'classic' ]; then
            which icc
            spack external find intel-oneapi-compilers-classic
            COMPILER=intel-oneapi-compilers-classic
            CLASSIC_LD_PATH='/opt/intel/oneapi/compiler/${{ matrix.config.compiler-version }}/linux/compiler/lib/intel64_lin'
          fi
          compilerstoallow="'%${COMPILER}'"
          if [[ " oneapi classic " =~ " ${{ matrix.config.compiler }} " ]]; then
            compilerstoallow="${compilerstoallow},'%gcc@${gccver}'"
            # Fix libimf.so not found issue AND 2025.3.x mismatch issue
            spack fix-intel-config --consolidate
          fi
          allowedcompilerspecs=$(echo $compilerstoallow | sed "s:%::g;s:,: :;s:'::g")

          spack config add "concretizer:reuse:include:[${compilerstoallow}]"
          spack config add "packages:all:prefer:['%$COMPILER']"
          spack config add "packages:all:require:'target=x86_64'"
          # The following is a problem for CRTM:
          spack config add "packages:fortran:require:['$COMPILER']"

          spack config add "packages:mpi:require:'${{ matrix.config.mpi }}@${{ matrix.config.mpi-version }}'"
          if [ "${{ matrix.config.mpi }}" == intel-oneapi-mpi ]; then
            sed -i "s|^  packages:|  packages:\n    intel-oneapi-mpi:\n      buildable: false\n      externals:\n      - spec: intel-oneapi-mpi@${{ matrix.config.mpi-version }}\n        prefix: /opt/intel/oneapi|" $SPACK_ENV/spack.yaml
            spack config add "packages:mpi:buildable:false"
          fi

          spack external find gcc git git-lfs
          # Avoid various C++-related Intel compiler bugs by building some packages with GCC:
          for pkg in diffutils sed grep libidn2 tar berkeley-db gettext findutils cmake libiconv m4; do
            spack config add "packages:${pkg}:require:'%gcc'"
          done
          spack filter-compilers $allowedcompilerspecs --keep-only

          echo "::group:: cat spack.yaml"
          cat $SPACK_ENV/spack.yaml
          echo "::endgroup::"

          # Concretize environment
          spack concretize --fresh |& tee log.concretize.${app}

          # Validate
          spack validate compilers $allowedcompilerspecs
          if [[ " oneapi classic " =~ " ${{ matrix.config.compiler }} " ]]; then
            spack validate allow-pkgs-for-compiler gcc cmake diffutils
          fi

          # If running from the cron trigger, rebuild from scratch
          if [ ! -z '${{ github.event.schedule }}' ]; then NOCACHE="--no-cache"; fi
          spack config add 'config:build_stage:~/spack'

          # Configure trust for signed packages from this build cache
          # Import both public and private keys into Spack's GPG keyring
          echo "${GPG_PUBLIC_KEY:?}" > /tmp/spack-signing-key.asc
          spack gpg init || true
          spack gpg trust /tmp/spack-signing-key.asc || true
          
          echo "Signature verification and signing enabled for key ${SPACK_GPG_KEY_ID}"

          # Don't immediately exit job on failed 'spack install' so we can still cache whatever was built:
          set +e
          spack install --include-build-deps --show-log-on-error --fail-fast $NOCACHE
          app_rc=$?
          set -e

          # Generate container image for this application with view
          echo "Creating consolidated container image for ${app} with unified view"
          label=${{ matrix.config.os }}-${{ matrix.config.compiler }}-${{ matrix.config.compiler-version }}-${{ matrix.config.mpi }}-${{ matrix.config.mpi-version }}
          label=${label//:/x}
          image=$(echo ${{ matrix.config.os }} | sed 's|-|:|')

          # Push individual packages to GitHub Packages build cache (OCI repo).
          spack buildcache push --key "${SPACK_GPG_KEY_ID}" --with-build-dependencies emc-common-build-cache |& perl -pe 's/.+(Fetching|Using cached)/::debug::\1/'

          # Push packages to a local filesystem build cache for use in the Docker build.
          fs_buildcache=/tmp/spack-buildcache
          mkdir -p ${fs_buildcache}
          spack buildcache push --unsigned --with-build-dependencies ${fs_buildcache}

          spack config remove 'config:template_dirs'
          spack config add "config:template_dirs:[${GITHUB_WORKSPACE}/templates/]"
          rm $SPACK_ROOT/share/spack/templates/container -rf
          spack repo remove custom_repo
          # Ensure nceplibs directory exists for Docker COPY (create empty if not nceplibs app)
          if [[ ! -d nceplibs ]]; then
            mkdir -p nceplibs
          fi
          
          # Capture Spack version information for reproducibility
          spack_commit=$(git -C $SPACK_ROOT rev-parse HEAD)
          spack_version=$(spack --version)
          echo "Spack commit: ${spack_commit}"
          echo "Spack version: ${spack_version}"
          
          # Add container and view configuration to spack.yaml
          spack config add "view:true"
          
          # Add common container and mirror configuration
          if [ ${{ matrix.config.compiler-name }} == gcc ]; then
            gcc_ver=${{ matrix.config.compiler-version }}
          else
            gcc_ver=13 # this could be refined :)
          fi
          cat >> $SPACK_ENV/spack.yaml <<EOF
            mirrors:
              emc-common-build-cache: oci://ghcr.io/${OCI_USERNAME}/ci-common-build-cache
            container:
              format: docker
              images:
                os: ${image}
                spack: develop
              labels:
                org.opencontainers.image.spack-commit: '${spack_commit}'
                org.opencontainers.image.spack-version: '${spack_version}'
                org.opencontainers.image.spack-packages-origin: '${spack_packages_repo_url}'
                org.opencontainers.image.spack-packages-commit: '${spack_packages_commit}'
              strip: false
              os_packages:
                final:
                  - git
                  - python3
                  - python3-yaml
                  - gcc-$gcc_ver
                  - g++-$gcc_ver
                  - gfortran-$gcc_ver
                  - vim
                  - emacs
                  - nano
                  - gpg
                  - wget
                  - sudo
                  - curl
                  - ca-certificates
          EOF

          spack config blame

          # Generate install-intel.sh from template, substituting matrix config values
          sed \
            -e 's/@COMPILER@/${{ matrix.config.compiler }}/g' \
            -e 's/@COMPILER_VERSION@/${{ matrix.config.compiler-version }}/g' \
            -e 's/@MPI@/${{ matrix.config.mpi }}/g' \
            -e 's/@MPI_VERSION@/${{ matrix.config.mpi-version }}/g' \
            "${GITHUB_WORKSPACE}/install-intel.sh.in" > install-intel.sh
          chmod +x install-intel.sh

          # Generate Dockerfile using spack containerize (already in $SPACK_ENV from earlier cd)
          $(which spack) containerize > Dockerfile

          echo "::group:: Dockerfile contents"
          cat Dockerfile
          echo "::endgroup::"

          # Build and push the container image
          image_repo=ghcr.io/${OCI_USERNAME,,}/ci-common-build-cache/${app}-${label}
          image_ref=${image_repo}:latest
          if [[ ! -d "${fs_buildcache}" ]]; then
            echo "Filesystem build cache does not exist: ${fs_buildcache}"
            exit 1
          fi
          
          # Export public key for inclusion in the container image
          gpg --armor --export ${SPACK_GPG_KEY_ID} > ${SPACK_ENV}/spack-signing-public.asc
          echo "Exported public key for container image"
          
          echo "::group:: Docker build"
          docker buildx build --load \
            --build-context spack_buildcache=${fs_buildcache} \
            --build-context spack_packages=${SPACK_ROOT}/spack-packages \
            -t ${image_ref} .
          echo "::endgroup::"
          
          # Save Docker image and load into Podman for GPG-signed push
          echo "::group:: Transfer image to Podman"
          docker save ${image_ref} | podman load
          echo "::endgroup::"
          
          # Login to registry with Podman
          printf '%s' "${OCI_TOKEN}" | podman login ghcr.io -u ${OCI_USERNAME} --password-stdin 2>&1 | grep -v 'WARNING'
          
          # Push and sign the container image using GPG (same key as Spack packages)
          echo "::group:: Podman push with GPG signing"
          # Configure signature storage location in registry
          mkdir -p ~/.config/containers/registries.d
          echo "docker:" > ~/.config/containers/registries.d/ghcr.io.yaml
          echo "  ghcr.io:" >> ~/.config/containers/registries.d/ghcr.io.yaml
          echo "    sigstore: https://ghcr.io/${OCI_USERNAME,,}/ci-common-build-cache-signatures" >> ~/.config/containers/registries.d/ghcr.io.yaml
          echo "    sigstore-staging: file:///tmp/podman-signatures" >> ~/.config/containers/registries.d/ghcr.io.yaml
          mkdir -p /tmp/podman-signatures
          
          # Cache GPG passphrase in the agent by performing a test signing operation
          echo "Caching GPG passphrase for signing..."
          echo "test" | gpg --batch --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" --sign --armor --local-user ${SPACK_GPG_KEY_ID} -o /tmp/test.sig
          rm -f /tmp/test.sig
          echo "GPG passphrase cached successfully"
          
          # Set environment for GPG agent
          export GPG_TTY=$(tty)
          
          # Push with signature
          podman push --sign-by ${SPACK_GPG_KEY_ID} ${image_ref}
          echo "Container image pushed and signed with GPG key: ${SPACK_GPG_KEY_ID}"
          echo "::endgroup::"
          
          # Verify the signature using skopeo
          echo "::group:: Verify container image signature"
          # Create policy.json for verification
          echo "{" > ~/.config/containers/policy.json
          echo "  \"default\": [{\"type\": \"insecureAcceptAnything\"}]," >> ~/.config/containers/policy.json
          echo "  \"transports\": {" >> ~/.config/containers/policy.json
          echo "    \"docker\": {" >> ~/.config/containers/policy.json
          echo "      \"ghcr.io/${OCI_USERNAME,,}/ci-common-build-cache\": [" >> ~/.config/containers/policy.json
          echo "        {" >> ~/.config/containers/policy.json
          echo "          \"type\": \"signedBy\"," >> ~/.config/containers/policy.json
          echo "          \"keyType\": \"GPGKeys\"," >> ~/.config/containers/policy.json
          echo "          \"keyPath\": \"${SPACK_ENV}/spack-signing-public.asc\"" >> ~/.config/containers/policy.json
          echo "        }" >> ~/.config/containers/policy.json
          echo "      ]" >> ~/.config/containers/policy.json
          echo "    }" >> ~/.config/containers/policy.json
          echo "  }" >> ~/.config/containers/policy.json
          echo "}" >> ~/.config/containers/policy.json
          skopeo inspect --raw docker://${image_ref} > /dev/null && echo "Signature verification successful"
          echo "::endgroup::"

          # Record immutable digest reference for reproducible pulls.
          image_with_digest=$(podman image inspect ${image_ref} --format '{{range .RepoDigests}}{{.}}{{end}}')
          repo_digest=$(echo $image_with_digest | grep -Po "@sha256:\K.*")
          echo "Image tag: ${image_ref}"
          echo "Image digest: ${repo_digest}"
          {
            echo "### Container image"
            echo "- Tag: \`${image_ref}\`"
            echo "- Digest: \`${repo_digest}\`"
            echo "- Tag w/digest: \`${image_with_digest}\`"
            echo "- Signed: ✅ Yes (GPG key: \`${SPACK_GPG_KEY_ID}\`)"
            echo ""
            echo "#### Verify signature:"
            echo "\`\`\`bash"
            echo "# Import the public key (embedded in image or from GitHub release)"
            echo "docker run --rm ${image_ref} cat /etc/spack-signing-public.asc | gpg --import"
            echo ""
            echo "# Verify with skopeo (requires policy.json configuration)"
            echo "skopeo inspect --raw docker://${image_ref}"
            echo "\`\`\`"
          } >> ${GITHUB_STEP_SUMMARY}

          if [ $app_rc -ne 0 ]; then echo "install-time error!"; exit 1; fi

  update-buildcache-index:
    needs: [common-build-cache]
    runs-on: ubuntu-24.04
    permissions:
      packages: write
    steps:
      - name: "Get Spack"
        uses: spack/setup-spack@v3

      - name: "Update buildcache index"
        shell: spack-bash {0}
        env:
          OCI_USERNAME: ${{ github.repository_owner }}
          OCI_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Mask token
          echo "::add-mask::${OCI_TOKEN}"
          
          for compiler in gcc oneapi classic; do
            spack mirror add emc-common-build-cache-$compiler oci://ghcr.io/$OCI_USERNAME/ci-common-build-cache-$compiler
            spack mirror set --push --oci-username-variable OCI_USERNAME --oci-password-variable OCI_TOKEN emc-common-build-cache-$compiler
            spack buildcache update-index emc-common-build-cache-$compiler
          done
